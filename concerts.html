<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koncerty — Projekt Hůrka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Caveat:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
<style>
:root {
  --moss: #4a6b3a;
  --deep-forest: #1a2e12;
  --mushroom: #c44b4f;
  --fairy-gold: #d4a843;
  --lichen: #8fb36a;
  --night-purple: #2d1b4e;
  --spore: #e8c86a;
  --bg: #0d1a08;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes sway { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes morphBlob {
  0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
  25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
  50% { border-radius: 50% 60% 30% 60% / 30% 60% 70% 40%; }
  75% { border-radius: 60% 30% 50% 40% / 60% 40% 60% 30%; }
}
@keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
@keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
@keyframes growIn { from { transform: scaleY(0); opacity: 0; } to { transform: scaleY(1); opacity: 1; } }

body {
  background: var(--bg);
  color: var(--lichen);
  font-family: 'Pangolin', cursive;
  overflow-x: hidden;
  min-height: 100vh;
}

.bg-gradient {
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse at 30% 70%, rgba(74, 107, 58, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, rgba(45, 27, 78, 0.15) 0%, transparent 60%),
    linear-gradient(180deg, #0d1a08, #121f0d, #0a1506);
  pointer-events: none;
  z-index: 0;
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.firefly {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--spore);
  box-shadow: 0 0 8px 3px rgba(232, 200, 106, 0.6);
  animation: pulse 3s ease-in-out infinite, float 8s ease-in-out infinite;
}

/* Page content */
.page {
  position: relative;
  z-index: 5;
  max-width: 700px;
  margin: 0 auto;
  padding: 40px 20px 160px;
}

/* Back link */
.back-link {
  display: inline-block;
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  color: var(--lichen);
  text-decoration: none;
  opacity: 0.5;
  transition: opacity 0.3s, transform 0.3s;
  margin-bottom: 40px;
  animation: fadeInUp 0.8s ease-out;
}

.back-link:hover {
  opacity: 1;
  transform: translateX(-5px);
}

/* Page title */
.page-title {
  font-family: 'Indie Flower', cursive;
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--spore);
  text-align: center;
  margin-bottom: 10px;
  animation: fadeInUp 1s ease-out;
  text-shadow: 0 0 40px rgba(232, 200, 106, 0.2);
}

.page-subtitle {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: rgba(143, 179, 106, 0.4);
  text-align: center;
  margin-bottom: 60px;
  animation: fadeInUp 1.2s ease-out;
}

/* Concert card */
.concert-card {
  position: relative;
  padding: 30px 35px;
  margin-bottom: 35px;
  background: rgba(26, 46, 18, 0.5);
  backdrop-filter: blur(4px);
  transition: transform 0.3s, background 0.3s;
  animation: fadeInUp 1s ease-out;
  animation-fill-mode: backwards;
  transform-origin: bottom center;
}

.concert-card:hover {
  transform: scale(1.02);
  background: rgba(26, 46, 18, 0.7);
}

.concert-card-border {
  position: absolute;
  inset: 0;
  border: 1.5px solid rgba(143, 179, 106, 0.2);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  animation: morphBlob 10s ease-in-out infinite;
  pointer-events: none;
  transition: border-color 0.3s;
}

.concert-card:hover .concert-card-border {
  border-color: rgba(212, 168, 67, 0.4);
}

.concert-card.past {
  opacity: 0.35;
}

.concert-card.past:hover {
  opacity: 0.5;
}

.concert-card.next {
  background: rgba(74, 107, 58, 0.15);
}

.concert-card.next .concert-card-border {
  border-color: rgba(212, 168, 67, 0.4);
}

.next-badge {
  display: inline-block;
  font-family: 'Caveat', cursive;
  font-size: 0.85rem;
  color: var(--fairy-gold);
  border: 1px solid rgba(212, 168, 67, 0.3);
  padding: 2px 12px;
  border-radius: 20px;
  margin-bottom: 10px;
  animation: breathe 3s ease-in-out infinite;
}

.card-date {
  font-family: 'Caveat', cursive;
  font-size: clamp(1.3rem, 3.5vw, 1.6rem);
  color: var(--spore);
  margin-bottom: 4px;
}

.card-title {
  font-family: 'Indie Flower', cursive;
  font-size: clamp(1.5rem, 4vw, 2rem);
  color: var(--lichen);
  margin-bottom: 8px;
  line-height: 1.3;
}

.card-venue {
  font-family: 'Pangolin', cursive;
  font-size: 1rem;
  color: rgba(143, 179, 106, 0.6);
  margin-bottom: 4px;
}

.card-meta {
  font-family: 'Caveat', cursive;
  font-size: 0.95rem;
  color: rgba(143, 179, 106, 0.4);
  margin-top: 10px;
}

.card-meta span {
  margin-right: 15px;
}

.card-bands {
  font-family: 'Pangolin', cursive;
  font-size: 0.9rem;
  color: rgba(196, 75, 79, 0.6);
  margin-top: 6px;
}

.card-link {
  display: inline-block;
  margin-top: 12px;
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  color: var(--fairy-gold);
  text-decoration: none;
  opacity: 0.6;
  transition: opacity 0.3s;
}

.card-link:hover { opacity: 1; }

/* Decorative dividers between cards */
.card-divider {
  text-align: center;
  margin: 10px 0;
  opacity: 0.2;
}

/* Section labels */
.section-label {
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  color: rgba(143, 179, 106, 0.3);
  text-transform: lowercase;
  letter-spacing: 2px;
  margin-bottom: 20px;
  margin-top: 40px;
  text-align: center;
  animation: fadeInUp 1.2s ease-out;
}

/* Decorative vine between sections */
.section-vine {
  text-align: center;
  margin: 30px 0;
  opacity: 0.25;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  animation: fadeInUp 1.2s ease-out;
}

.empty-state p {
  font-family: 'Caveat', cursive;
  font-size: 1.3rem;
  color: rgba(143, 179, 106, 0.4);
}

/* Bottom mushroom */
.mushroom-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  pointer-events: none;
  z-index: 3;
}

@media (max-width: 600px) {
  .concert-card { padding: 22px 20px; }
  .page { padding: 30px 15px 140px; }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="fireflies" id="fireflies"></div>

<div class="page">
  <a href="index.html" class="back-link">← zpět do lesa</a>
  
  <h1 class="page-title">koncerty</h1>
  <p class="page-subtitle">~ kde nás potkáte ~</p>

  <div id="concertList"></div>
</div>

<!-- Bottom mushrooms -->
<div class="mushroom-footer">
  <svg viewBox="0 0 1200 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;bottom:0">
    <path d="M0 70 Q200 55 400 68 Q600 80 800 60 Q1000 50 1200 65 L1200 100 L0 100Z" fill="#1a2e12" opacity="0.8"/>
    <path d="M0 85 Q300 75 600 82 Q900 90 1200 80 L1200 100 L0 100Z" fill="#0d1a08"/>
    <g transform="translate(200, 42)" opacity="0.5">
      <rect x="8" y="10" width="4" height="18" rx="2" fill="#8fb36a" opacity="0.5"/>
      <ellipse cx="10" cy="10" rx="13" ry="9" fill="#c44b4f" opacity="0.6"/>
      <circle cx="6" cy="8" r="1.5" fill="#fff" opacity="0.3"/>
    </g>
    <g transform="translate(600, 35)" opacity="0.5">
      <rect x="10" y="12" width="5" height="22" rx="2.5" fill="#8fb36a" opacity="0.5"/>
      <ellipse cx="12.5" cy="12" rx="16" ry="11" fill="#c44b4f" opacity="0.6"/>
      <circle cx="8" cy="9" r="2" fill="#fff" opacity="0.3"/>
      <circle cx="16" cy="7" r="1.5" fill="#fff" opacity="0.3"/>
    </g>
    <g transform="translate(900, 40)" opacity="0.5">
      <rect x="7" y="9" width="3" height="16" rx="1.5" fill="#8fb36a" opacity="0.5"/>
      <ellipse cx="8.5" cy="9" rx="11" ry="8" fill="#d4a843" opacity="0.4"/>
    </g>
    <g stroke="#4a6b3a" fill="none" stroke-width="1.5" opacity="0.4">
      <path d="M350 68 Q352 50 348 38"/><path d="M355 68 Q360 45 355 33"/>
      <path d="M800 60 Q802 42 798 30"/><path d="M805 60 Q810 37 805 25"/>
    </g>
  </svg>
</div>

<script>
// Fireflies
const ff = document.getElementById('fireflies');
for (let i = 0; i < 18; i++) {
  const f = document.createElement('div');
  f.className = 'firefly';
  f.style.left = Math.random() * 100 + '%';
  f.style.top = Math.random() * 100 + '%';
  f.style.animationDelay = Math.random() * 5 + 's';
  f.style.animationDuration = (3 + Math.random() * 4) + 's, ' + (6 + Math.random() * 6) + 's';
  ff.appendChild(f);
}

// Load and parse concerts
async function loadConcerts() {
  try {
    const response = await fetch('concerts.md');
    const text = await response.text();
    const concerts = parseConcerts(text);
    renderConcerts(concerts);
  } catch (e) {
    document.getElementById('concertList').innerHTML = `
      <div class="empty-state">
        <p>nepodařilo se načíst koncerty</p>
        <p style="margin-top: 10px; font-size: 1rem;">zkus to znova za chvíli</p>
      </div>
    `;
  }
}

function parseConcerts(md) {
  const concerts = [];
  const blocks = md.split(/^---$/m).filter(b => b.trim());
  
  for (const block of blocks) {
    const concert = {};
    const lines = block.trim().split('\n');
    
    for (const line of lines) {
      const match = line.match(/^(\w+):\s*(.+)$/);
      if (match) {
        const key = match[1].toLowerCase();
        const val = match[2].trim();
        if (key === 'date') concert.date = new Date(val);
        else if (key === 'title' || key === 'název') concert.title = val;
        else if (key === 'venue' || key === 'místo') concert.venue = val;
        else if (key === 'city' || key === 'město') concert.city = val;
        else if (key === 'price' || key === 'vstupné') concert.price = val;
        else if (key === 'time' || key === 'čas') concert.time = val;
        else if (key === 'bands' || key === 'kapely') concert.bands = val;
        else if (key === 'link' || key === 'odkaz') concert.link = val;
      }
    }
    
    if (concert.date && concert.title) concerts.push(concert);
  }
  
  concerts.sort((a, b) => a.date - b.date);
  return concerts;
}

function formatDate(d) {
  const days = ['neděle', 'pondělí', 'úterý', 'středa', 'čtvrtek', 'pátek', 'sobota'];
  const months = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 
                  'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function renderConcerts(concerts) {
  const container = document.getElementById('concertList');
  const now = new Date();
  
  const upcoming = concerts.filter(c => c.date >= now);
  const past = concerts.filter(c => c.date < now).reverse();
  
  let html = '';
  
  // Find the next concert
  const nextIdx = upcoming.length > 0 ? 0 : -1;
  
  if (upcoming.length > 0) {
    html += '<div class="section-label">~ nadcházející ~</div>';
    upcoming.forEach((c, i) => {
      const isNext = i === 0;
      const delay = 0.2 + i * 0.15;
      html += renderCard(c, isNext, false, delay);
      if (i < upcoming.length - 1) {
        html += `<div class="card-divider">
          <svg width="40" height="20" viewBox="0 0 40 20"><path d="M5 10 Q20 2 35 10" fill="none" stroke="#8fb36a" stroke-width="1"/><circle cx="20" cy="6" r="2" fill="#4a6b3a"/></svg>
        </div>`;
      }
    });
  } else {
    html += `<div class="empty-state">
      <svg width="60" height="60" viewBox="0 0 60 60" style="opacity:0.3; margin-bottom:20px;">
        <circle cx="30" cy="30" r="25" fill="none" stroke="#8fb36a" stroke-width="1"/>
        <path d="M20 35 Q30 28 40 35" fill="none" stroke="#8fb36a" stroke-width="1.5"/>
        <circle cx="22" cy="24" r="2" fill="#8fb36a"/>
        <circle cx="38" cy="24" r="2" fill="#8fb36a"/>
      </svg>
      <p>zatím žádné koncerty v plánu</p>
      <p style="margin-top: 8px; font-size: 1rem;">ale něco roste...</p>
    </div>`;
  }
  
  if (past.length > 0) {
    html += `
      <div class="section-vine">
        <svg width="120" height="40" viewBox="0 0 120 40">
          <path d="M10 20 Q30 5 60 20 Q90 35 110 20" fill="none" stroke="#4a6b3a" stroke-width="1"/>
          <circle cx="60" cy="20" r="3" fill="#4a6b3a" opacity="0.5"/>
        </svg>
      </div>
      <div class="section-label">~ proběhlo ~</div>
    `;
    past.forEach((c, i) => {
      const delay = 0.2 + i * 0.1;
      html += renderCard(c, false, true, delay);
    });
  }
  
  container.innerHTML = html;
}

function renderCard(concert, isNext, isPast, delay) {
  const classes = ['concert-card'];
  if (isNext) classes.push('next');
  if (isPast) classes.push('past');
  
  let meta = '';
  if (concert.time) meta += `<span>⏰ ${concert.time}</span>`;
  if (concert.price) meta += `<span>🍄 ${concert.price}</span>`;
  
  return `
    <div class="${classes.join(' ')}" style="animation-delay: ${delay}s">
      <div class="concert-card-border" style="animation-delay: ${Math.random() * 5}s"></div>
      ${isNext ? '<div class="next-badge">✦ příští koncert</div>' : ''}
      <div class="card-date">${formatDate(concert.date)}</div>
      <div class="card-title">${concert.title}</div>
      <div class="card-venue">${concert.venue}${concert.city ? ', ' + concert.city : ''}</div>
      ${concert.bands ? `<div class="card-bands">♪ ${concert.bands}</div>` : ''}
      ${meta ? `<div class="card-meta">${meta}</div>` : ''}
      ${concert.link ? `<a href="${concert.link}" target="_blank" class="card-link">→ více info</a>` : ''}
    </div>
  `;
}

loadConcerts();
</script>
</body>
</html>
