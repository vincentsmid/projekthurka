<script>
// === FIREFLIES (reduced count) ===
const firefliesContainer = document.getElementById('fireflies');
const fireflyColors = ['#ff6ef0', '#00ffe0', '#ffaa30', '#f5e080', '#b8e090'];
for (let i = 0; i < 14; i++) {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = Math.random() * 100 + '%';
  ff.style.top = Math.random() * 100 + '%';
  ff.style.animationDelay = Math.random() * 5 + 's';
  ff.style.animationDuration = (4 + Math.random() * 4) + 's, ' + (8 + Math.random() * 6) + 's';
  ff.style.background = fireflyColors[Math.floor(Math.random() * fireflyColors.length)];
  ff.style.width = (2 + Math.random() * 4) + 'px';
  ff.style.height = ff.style.width;
  firefliesContainer.appendChild(ff);
}

// === DRIPS (reduced count) ===
const dripsContainer = document.getElementById('drips');
const dripColors = ['#ff6ef0', '#00ffe0', '#ffaa30', '#b8e090'];
for (let i = 0; i < 5; i++) {
  const drip = document.createElement('div');
  drip.className = 'drip';
  drip.style.left = (10 + Math.random() * 80) + '%';
  drip.style.animationDelay = Math.random() * 8 + 's';
  drip.style.animationDuration = (5 + Math.random() * 5) + 's';
  const color = dripColors[Math.floor(Math.random() * dripColors.length)];
  drip.style.background = `linear-gradient(to bottom, transparent, ${color}, transparent)`;
  dripsContainer.appendChild(drip);
}

// === LOADING ===
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 600);
});

// === CONCERT LOADING ===
async function loadNextConcert() {
  try {
    const response = await fetch('concerts.md');
    const text = await response.text();
    const concerts = parseConcerts(text);
    const now = new Date();
    const upcoming = concerts.filter(c => c.date >= now);
    if (upcoming.length > 0) {
      const next = upcoming[0];
      document.getElementById('concertTitle').textContent = next.title;
      document.getElementById('concertDate').textContent = formatDate(next.date);
      document.getElementById('concertVenue').textContent = next.venue + (next.city ? ', ' + next.city : '');
    } else {
      document.getElementById('concertTitle').textContent = 'žádné koncerty';
      document.getElementById('concertDate').textContent = 'zatím...';
      document.getElementById('concertVenue').textContent = 'ale něco se chystá';
    }
  } catch (e) {
    document.getElementById('concertTitle').textContent = 'koncerty';
    document.getElementById('concertDate').textContent = '';
    document.getElementById('concertVenue').textContent = 'podívej se na seznam →';
  }
}

function parseConcerts(md) {
  const concerts = [];
  const blocks = md.split(/^---$/m).filter(b => b.trim());
  for (const block of blocks) {
    const concert = {};
    const lines = block.trim().split('\n');
    for (const line of lines) {
      const match = line.match(/^(\w+):\s*(.+)$/);
      if (match) {
        const key = match[1].toLowerCase();
        const val = match[2].trim();
        if (key === 'date') concert.date = new Date(val);
        else if (key === 'title' || key === 'název') concert.title = val;
        else if (key === 'venue' || key === 'místo') concert.venue = val;
        else if (key === 'city' || key === 'město') concert.city = val;
        else if (key === 'price' || key === 'vstupné') concert.price = val;
        else if (key === 'time' || key === 'čas') concert.time = val;
        else if (key === 'bands' || key === 'kapely') concert.bands = val;
        else if (key === 'link' || key === 'odkaz') concert.link = val;
      }
    }
    if (concert.date && concert.title) concerts.push(concert);
  }
  concerts.sort((a, b) => a.date - b.date);
  return concerts;
}

function formatDate(d) {
  const days = ['neděle', 'pondělí', 'úterý', 'středa', 'čtvrtek', 'pátek', 'sobota'];
  const months = ['ledna', 'února', 'března', 'dubna', 'května', 'června',
                  'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

loadNextConcert();

// === CURSOR TRAIL (lightweight pool) ===
(function() {
  const colors = ['#ff6ef0', '#00ffe0', '#ffaa30', '#f5e080'];
  const pool = [];
  const poolSize = 12;
  let idx = 0;
  let lastX = 0, lastY = 0;
  for (let i = 0; i < poolSize; i++) {
    const dot = document.createElement('div');
    dot.className = 'cursor-trail';
    document.body.appendChild(dot);
    pool.push(dot);
  }
  document.addEventListener('mousemove', function(e) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    if (dx * dx + dy * dy < 64) return; // throttle: skip if moved < 8px
    lastX = e.clientX; lastY = e.clientY;
    const dot = pool[idx % poolSize];
    idx++;
    dot.style.background = colors[idx % colors.length];
    dot.style.left = e.clientX - 4 + 'px';
    dot.style.top = e.clientY - 4 + 'px';
    dot.style.opacity = '0.6';
    dot.style.transform = 'scale(1)';
    setTimeout(function() { dot.style.opacity = '0'; }, 50);
  });
})();
</script>
</body>
</html>
