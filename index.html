<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt Hůrka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pangolin&family=Silkscreen&family=Caveat:wght@400;700&family=Indie+Flower&display=swap" rel="stylesheet">
<style>
:root {
  --moss: #4a6b3a;
  --deep-forest: #1a2e12;
  --mushroom: #c44b4f;
  --fairy-gold: #d4a843;
  --lichen: #8fb36a;
  --night-purple: #2d1b4e;
  --spore: #e8c86a;
  --bg: #0d1a08;
  --mist: rgba(141, 179, 106, 0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes sway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
@keyframes swayReverse {
  0%, 100% { transform: rotate(3deg); }
  50% { transform: rotate(-3deg); }
}
@keyframes grow {
  0% { transform: scaleY(0); opacity: 0; }
  100% { transform: scaleY(1); opacity: 1; }
}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  33% { transform: translateY(-15px) rotate(2deg); }
  66% { transform: translateY(-8px) rotate(-1deg); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes psychSwirl {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes drip {
  0% { transform: translateY(-10px); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}
@keyframes spiralSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes eyeOpen {
  0%, 40%, 100% { transform: scaleY(1); }
  45%, 55% { transform: scaleY(0.1); }
}
@keyframes morphBlob {
  0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
  25% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
  50% { border-radius: 50% 60% 30% 60% / 30% 60% 70% 40%; }
  75% { border-radius: 60% 30% 50% 40% / 60% 40% 60% 30%; }
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--lichen);
  font-family: 'Pangolin', cursive;
  overflow-x: hidden;
  min-height: 100vh;
  position: relative;
}

/* === BACKGROUND LAYERS === */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bg-gradient {
  background: 
    radial-gradient(ellipse at 20% 80%, rgba(74, 107, 58, 0.15) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(45, 27, 78, 0.2) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 50%, rgba(196, 75, 79, 0.05) 0%, transparent 40%),
    linear-gradient(180deg, #0d1a08 0%, #121f0d 50%, #0a1506 100%);
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.firefly {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--spore);
  box-shadow: 0 0 8px 3px rgba(232, 200, 106, 0.6), 0 0 20px 6px rgba(232, 200, 106, 0.2);
  animation: pulse 3s ease-in-out infinite, float 8s ease-in-out infinite;
}

/* === SVG DECORATIONS === */
.vine-container {
  position: fixed;
  pointer-events: none;
  z-index: 1;
}

.vine-left {
  left: -20px;
  top: 0;
  width: 200px;
  height: 100vh;
  animation: sway 8s ease-in-out infinite;
  transform-origin: top center;
}

.vine-right {
  right: -20px;
  top: 0;
  width: 200px;
  height: 100vh;
  animation: swayReverse 9s ease-in-out infinite;
  transform-origin: top center;
}

/* === MAIN CONTENT === */
.main-content {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* === LOGO === */
.logo-wrapper {
  margin-top: 60px;
  margin-bottom: 20px;
  animation: fadeInUp 1.5s ease-out, breathe 6s ease-in-out infinite;
  position: relative;
}

.logo-wrapper img {
  max-width: min(500px, 85vw);
  height: auto;
  filter: brightness(1.1) contrast(1.05);
  /* tint the logo to match the green theme */
}

.logo-glow {
  position: absolute;
  inset: -40px;
  background: radial-gradient(ellipse, rgba(143, 179, 106, 0.15) 0%, transparent 70%);
  z-index: -1;
  animation: breathe 4s ease-in-out infinite;
}

/* === TAGLINE === */
.tagline {
  font-family: 'Caveat', cursive;
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: rgba(143, 179, 106, 0.5);
  letter-spacing: 3px;
  margin-bottom: 60px;
  animation: fadeInUp 1.8s ease-out;
  text-transform: lowercase;
}

/* === NEXT CONCERT BLOCK === */
.next-concert {
  animation: fadeInUp 2s ease-out;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  display: block;
  padding: 40px 50px;
  position: relative;
  transition: transform 0.3s ease;
  max-width: 600px;
}

.next-concert:hover {
  transform: scale(1.03);
}

.next-concert:hover .concert-border {
  animation: morphBlob 4s ease-in-out infinite, psychSwirl 6s linear infinite;
}

.concert-border {
  position: absolute;
  inset: 0;
  border: 2px solid var(--lichen);
  border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
  animation: morphBlob 8s ease-in-out infinite;
  opacity: 0.5;
  transition: opacity 0.3s;
}

.next-concert:hover .concert-border {
  opacity: 1;
}

.concert-label {
  font-family: 'Caveat', cursive;
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: var(--fairy-gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.7;
}

.concert-title {
  font-family: 'Indie Flower', cursive;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--spore);
  line-height: 1.2;
  margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(232, 200, 106, 0.3);
}

.concert-date {
  font-family: 'Caveat', cursive;
  font-size: clamp(1.3rem, 4vw, 2rem);
  color: var(--lichen);
  margin-bottom: 6px;
}

.concert-venue {
  font-family: 'Pangolin', cursive;
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: rgba(143, 179, 106, 0.6);
}

.concert-cta {
  margin-top: 20px;
  font-family: 'Caveat', cursive;
  font-size: 1rem;
  color: var(--mushroom);
  opacity: 0.6;
  transition: opacity 0.3s;
}

.next-concert:hover .concert-cta {
  opacity: 1;
}

/* === BOTTOM MUSHROOM GARDEN === */
.mushroom-garden {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 120px;
  pointer-events: none;
  z-index: 3;
}

/* === NAVIGATION === */
.nav-links {
  margin-top: 80px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeInUp 2.5s ease-out;
}

.nav-links a {
  font-family: 'Indie Flower', cursive;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  color: var(--lichen);
  text-decoration: none;
  position: relative;
  padding: 8px 16px;
  transition: color 0.3s, transform 0.3s;
}

.nav-links a::after {
  content: '~';
  position: absolute;
  bottom: -5px;
  left: 50%;
  transform: translateX(-50%) scaleX(0);
  color: var(--fairy-gold);
  font-size: 1.5rem;
  transition: transform 0.3s;
}

.nav-links a:hover {
  color: var(--spore);
  transform: translateY(-3px);
}

.nav-links a:hover::after {
  transform: translateX(-50%) scaleX(1);
}

/* === DRIPPING === */
.drip {
  position: fixed;
  width: 3px;
  height: 20px;
  background: linear-gradient(to bottom, transparent, var(--lichen), transparent);
  border-radius: 50%;
  opacity: 0.3;
  animation: drip 6s linear infinite;
  z-index: 1;
}

/* === SPIRAL EYES === */
.third-eye {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  opacity: 0.12;
}

.third-eye svg {
  animation: spiralSpin 20s linear infinite;
}

/* === RESPONSIVE === */
@media (max-width: 600px) {
  .vine-left, .vine-right { width: 100px; }
  .main-content { padding: 20px 15px; }
  .logo-wrapper { margin-top: 40px; }
  .next-concert { padding: 30px 25px; }
  .nav-links { gap: 15px; }
}

/* === LOADING === */
.page-loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 1s ease, visibility 1s ease;
}

.page-loader.hidden {
  opacity: 0;
  visibility: hidden;
}

.loader-eye {
  width: 60px;
  height: 60px;
  animation: spiralSpin 2s linear infinite;
}

/* Footer */
.footer-zone {
  margin-top: 100px;
  padding-bottom: 140px;
  text-align: center;
  animation: fadeInUp 3s ease-out;
}

.footer-zone p {
  font-family: 'Caveat', cursive;
  font-size: 0.9rem;
  color: rgba(143, 179, 106, 0.3);
}

/* scroll hint */
.scroll-hint {
  margin-top: 40px;
  animation: float 4s ease-in-out infinite;
  opacity: 0.3;
}

</style>
</head>

<script>
// === FIREFLIES ===
const firefliesContainer = document.getElementById('fireflies');
for (let i = 0; i < 25; i++) {
  const ff = document.createElement('div');
  ff.className = 'firefly';
  ff.style.left = Math.random() * 100 + '%';
  ff.style.top = Math.random() * 100 + '%';
  ff.style.animationDelay = Math.random() * 5 + 's';
  ff.style.animationDuration = (3 + Math.random() * 4) + 's, ' + (6 + Math.random() * 6) + 's';
  ff.style.width = (2 + Math.random() * 4) + 'px';
  ff.style.height = ff.style.width;
  firefliesContainer.appendChild(ff);
}

// === DRIPS ===
const dripsContainer = document.getElementById('drips');
for (let i = 0; i < 8; i++) {
  const drip = document.createElement('div');
  drip.className = 'drip';
  drip.style.left = (10 + Math.random() * 80) + '%';
  drip.style.animationDelay = Math.random() * 8 + 's';
  drip.style.animationDuration = (4 + Math.random() * 4) + 's';
  dripsContainer.appendChild(drip);
}

// === LOADING ===
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 600);
});

// === CONCERT LOADING ===
async function loadNextConcert() {
  try {
    const response = await fetch('concerts.md');
    const text = await response.text();
    const concerts = parseConcerts(text);
    const now = new Date();
    
    const upcoming = concerts.filter(c => c.date >= now);
    
    if (upcoming.length > 0) {
      const next = upcoming[0];
      document.getElementById('concertTitle').textContent = next.title;
      document.getElementById('concertDate').textContent = formatDate(next.date);
      document.getElementById('concertVenue').textContent = next.venue + (next.city ? ', ' + next.city : '');
    } else {
      document.getElementById('concertTitle').textContent = 'žádné koncerty';
      document.getElementById('concertDate').textContent = 'zatím...';
      document.getElementById('concertVenue').textContent = 'ale něco se chystá';
    }
  } catch (e) {
    document.getElementById('concertTitle').textContent = 'Křest alba';
    document.getElementById('concertDate').textContent = '4. 4. 2026';
    document.getElementById('concertVenue').textContent = 'Kamina Boat, Praha';
  }
}

function parseConcerts(md) {
  const concerts = [];
  const blocks = md.split(/^---$/m).filter(b => b.trim());
  
  for (const block of blocks) {
    const concert = {};
    const lines = block.trim().split('\n');
    
    for (const line of lines) {
      const match = line.match(/^(\w+):\s*(.+)$/);
      if (match) {
        const key = match[1].toLowerCase();
        const val = match[2].trim();
        if (key === 'date') concert.date = new Date(val);
        else if (key === 'title' || key === 'název') concert.title = val;
        else if (key === 'venue' || key === 'místo') concert.venue = val;
        else if (key === 'city' || key === 'město') concert.city = val;
        else if (key === 'price' || key === 'vstupné') concert.price = val;
        else if (key === 'time' || key === 'čas') concert.time = val;
        else if (key === 'bands' || key === 'kapely') concert.bands = val;
        else if (key === 'link' || key === 'odkaz') concert.link = val;
      }
    }
    
    if (concert.date && concert.title) {
      concerts.push(concert);
    }
  }
  
  concerts.sort((a, b) => a.date - b.date);
  return concerts;
}

function formatDate(d) {
  const days = ['neděle', 'pondělí', 'úterý', 'středa', 'čtvrtek', 'pátek', 'sobota'];
  const months = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 
                  'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

loadNextConcert();
</script>
