  <!-- Concentric diamonds — mid area -->

<!-- Vine SVGs — trippy with animated colors and morphing -->

    <defs>
      <linearGradient id="vineGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ff6ef0" stop-opacity="0.5"/>
        <stop offset="50%" stop-color="#00ffe0" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ffaa30" stop-opacity="0.5"/>
      </linearGradient>
      <linearGradient id="vineGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#6a3db8" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#7ac460" stop-opacity="0.3"/>
      </linearGradient>
      <radialGradient id="mushGlow" cx="50%" cy="30%" r="60%">
        <stop offset="0%" stop-color="#ff6ef0" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#e8667a" stop-opacity="0.3"/>

      <filter id="tripGlow">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

}

const dripColors = ['#ff6ef0', '#00ffe0', '#ffaa30', '#b8e090'];

  drip.style.animationDuration = (4 + Math.random() * 4) + 's';
  const color = dripColors[Math.floor(Math.random() * dripColors.length)];
  drip.style.background = `linear-gradient(to bottom, transparent, ${color}, transparent)`;
  dripsContainer.appendChild(drip);
}

// === LOADING ===
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 600);
});

// === CONCERT LOADING ===
async function loadNextConcert() {
  try {
    const response = await fetch('concerts.md');
    const text = await response.text();
    const concerts = parseConcerts(text);
    const now = new Date();

    const upcoming = concerts.filter(c => c.date >= now);

    if (upcoming.length > 0) {
      const next = upcoming[0];
      document.getElementById('concertTitle').textContent = next.title;
      document.getElementById('concertDate').textContent = formatDate(next.date);
      document.getElementById('concertVenue').textContent = next.venue + (next.city ? ', ' + next.city : '');
    } else {
      document.getElementById('concertTitle').textContent = 'žádné koncerty';
      document.getElementById('concertDate').textContent = 'zatím...';
      document.getElementById('concertVenue').textContent = 'ale něco se chystá';
    }
  } catch (e) {
    document.getElementById('concertTitle').textContent = 'Křest alba';
    document.getElementById('concertDate').textContent = '4. 4. 2026';
    document.getElementById('concertVenue').textContent = 'Kamina Boat, Praha';
  }
}

function parseConcerts(md) {
  const concerts = [];
  const blocks = md.split(/^---$/m).filter(b => b.trim());

  for (const block of blocks) {
    const concert = {};
    const lines = block.trim().split('\n');

    for (const line of lines) {
      const match = line.match(/^(\w+):\s*(.+)$/);
      if (match) {
        const key = match[1].toLowerCase();
        const val = match[2].trim();
        if (key === 'date') concert.date = new Date(val);
        else if (key === 'title' || key === 'název') concert.title = val;
        else if (key === 'venue' || key === 'místo') concert.venue = val;
        else if (key === 'city' || key === 'město') concert.city = val;
        else if (key === 'price' || key === 'vstupné') concert.price = val;
        else if (key === 'time' || key === 'čas') concert.time = val;
        else if (key === 'bands' || key === 'kapely') concert.bands = val;
        else if (key === 'link' || key === 'odkaz') concert.link = val;
      }
    }

    if (concert.date && concert.title) {
      concerts.push(concert);
    }
  }

  concerts.sort((a, b) => a.date - b.date);
  return concerts;
}

function formatDate(d) {
  const days = ['neděle', 'pondělí', 'úterý', 'středa', 'čtvrtek', 'pátek', 'sobota'];
  const months = ['ledna', 'února', 'března', 'dubna', 'května', 'června',
                  'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
  return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

loadNextConcert();
